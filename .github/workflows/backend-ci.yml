name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  test:
    name: Lint, Type Check, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: promethean_test
          POSTGRES_USER: promethean
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://promethean:test_password@localhost:5432/promethean_test
      REDIS_URL: redis://localhost:6379
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      CLERK_JWKS_URL: https://placeholder.clerk.accounts.dev/.well-known/jwks.json
      SENTRY_DSN: ""
      RESEND_API_KEY: ""
      ENVIRONMENT: test
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:3000
      GITHUB_APP_ID: ""
      GITHUB_APP_PRIVATE_KEY: ""
      GITHUB_ORG: promethean-dev
      RESEND_FROM_EMAIL: noreply@promethean.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Lint with ruff
        working-directory: backend
        run: uv run ruff check .

      - name: Type check with mypy
        working-directory: backend
        run: uv run mypy app/

      - name: Check Alembic migrations
        working-directory: backend
        run: |
          uv run alembic upgrade head
          uv run alembic check

      - name: Run tests
        working-directory: backend
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=50

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        continue-on-error: true  # coverage upload is best-effort; never block CI
        with:
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t promethean-backend:ci ./backend
